# Deploy this API on Render (free) to avoid Vercel's ~10s serverless limit with MongoDB cold starts.
# https://render.com → New + Web Service → connect this repo
# Build: npm ci   Start: npm start   Health: /health
# Add env: MONGO_URL_YWAELE or MONGO_URL, JWT_SECRET_KEY, FRONTEND_URL, STRIPE_*, etc.

services:
  - type: web
    name: node-js-project-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
